<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Натальная карта - официальный отчет</title>
    <style>
        /* Стили для PDF документа */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: 'Playfair Display', 'Times New Roman', serif;
            color: #e5e5e5;
            line-height: 1.6;
        }

        .pdf-container {
            max-width: 210mm;
            margin: 0 auto;
            padding: 15mm;
            position: relative;
        }

        /* Золотые рамки и декоративные элементы */
        .gold-border {
            border: 2px solid #c9a54b;
            position: relative;
        }

        .gold-border::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(201, 165, 75, 0.3);
            pointer-events: none;
        }

        /* Титульная страница */
        .title-page {
            height: 277mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            page-break-after: always;
        }

        .title-page::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1px solid #c9a54b;
            opacity: 0.3;
        }

        .title-symbol {
            font-size: 80px;
            color: #c9a54b;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(201, 165, 75, 0.5);
        }

        .title-main {
            font-size: 48px;
            color: #c9a54b;
            font-weight: 600;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .title-sub {
            font-size: 32px;
            color: #fff;
            font-weight: 400;
            margin-bottom: 50px;
            font-style: italic;
        }

        .title-name {
            font-size: 36px;
            color: #fff;
            font-weight: 600;
            margin: 50px 0 20px;
            padding: 20px 40px;
            border-top: 2px solid #c9a54b;
            border-bottom: 2px solid #c9a54b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .title-birth {
            font-size: 20px;
            color: #c9a54b;
            margin-bottom: 50px;
        }

        .title-seal {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .seal-circle {
            width: 80px;
            height: 80px;
            border: 2px solid #c9a54b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .seal-circle span {
            font-size: 40px;
            color: #c9a54b;
        }

        .seal-text {
            font-size: 14px;
            color: #c9a54b;
            letter-spacing: 2px;
        }

        .title-signature {
            margin-top: 50px;
            font-size: 18px;
            color: #fff;
        }

        .title-signature strong {
            color: #c9a54b;
            font-size: 22px;
        }

        /* Страница с данными */
        .data-page {
            page-break-after: always;
            padding: 30px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h2 {
            font-size: 36px;
            color: #c9a54b;
            margin-bottom: 10px;
        }

        .page-header .underline {
            width: 100px;
            height: 2px;
            background: #c9a54b;
            margin: 0 auto;
        }

        /* Карточка асцендента */
        .ascendant-card {
            background: rgba(18, 18, 26, 0.8);
            border: 1px solid #c9a54b;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: center;
        }

        .ascendant-label {
            font-size: 18px;
            color: #c9a54b;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        .ascendant-value {
            font-size: 48px;
            color: #fff;
            font-weight: 600;
        }

        .ascendant-degree {
            font-size: 24px;
            color: #c9a54b;
            margin-top: 10px;
        }

        /* Сетка для Солнца и Луны */
        .sun-moon-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .celestial-card {
            background: rgba(18, 18, 26, 0.8);
            border: 1px solid #c9a54b;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }

        .celestial-icon {
            font-size: 48px;
            color: #c9a54b;
            margin-bottom: 15px;
        }

        .celestial-title {
            font-size: 24px;
            color: #c9a54b;
            margin-bottom: 10px;
        }

        .celestial-sign {
            font-size: 32px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .celestial-degree {
            font-size: 18px;
            color: #c9a54b;
        }

        /* Таблица планет */
        .planets-table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
            background: rgba(18, 18, 26, 0.8);
            border: 1px solid #c9a54b;
            border-radius: 20px;
            overflow: hidden;
        }

        .planets-table th {
            background: #c9a54b;
            color: #0a0a0f;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .planets-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(201, 165, 75, 0.3);
            color: #fff;
        }

        .planets-table tr:last-child td {
            border-bottom: none;
        }

        .planets-table td:first-child {
            font-weight: 600;
            color: #c9a54b;
        }

        /* Секция аспектов */
        .aspects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .aspect-card {
            background: rgba(18, 18, 26, 0.8);
            border: 1px solid #c9a54b;
            border-radius: 15px;
            padding: 20px;
        }

        .aspect-title {
            font-size: 18px;
            color: #c9a54b;
            font-weight: 600;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(201, 165, 75, 0.3);
        }

        .aspect-planets {
            font-size: 16px;
            color: #fff;
            margin-bottom: 8px;
        }

        .aspect-desc {
            font-size: 14px;
            color: #a0a0b0;
            line-height: 1.5;
        }

        /* Секция интерпретации */
        .interpretation-section {
            background: rgba(18, 18, 26, 0.8);
            border: 1px solid #c9a54b;
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
        }

        .interpretation-text {
            color: #fff;
            line-height: 1.8;
            font-size: 14px;
            white-space: pre-line;
        }

        .interpretation-text strong {
            color: #c9a54b;
        }

        /* Заключение */
        .conclusion-page {
            page-break-after: avoid;
            padding: 40px;
            background: rgba(18, 18, 26, 0.8);
            border: 2px solid #c9a54b;
            border-radius: 30px;
            margin-top: 40px;
        }

        .conclusion-title {
            font-size: 36px;
            color: #c9a54b;
            text-align: center;
            margin-bottom: 40px;
        }

        .conclusion-text {
            font-size: 16px;
            color: #fff;
            line-height: 2;
            margin-bottom: 50px;
        }

        .conclusion-signature {
            text-align: right;
            font-size: 18px;
            color: #fff;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #c9a54b;
        }

        .conclusion-signature strong {
            color: #c9a54b;
            font-size: 22px;
        }

        /* Нумерация страниц */
        .page-number {
            text-align: center;
            color: #c9a54b;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div id="pdf-content" class="pdf-container">
    <!-- Контент будет вставлен через JavaScript -->
</div>
</body>
</html>
